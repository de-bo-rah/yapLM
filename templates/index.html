<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PDF to Podcast</title>
    <style>
      :root {
        --bg: #161412;
        --ink: #f7f2ec;
        --accent: #d14b3f;
        --accent-strong: #f06b5d;
        --panel: rgba(20, 18, 16, 0.82);
        --muted: #d5c8be;
        --ring: rgba(209, 75, 63, 0.45);
        --glow: rgba(209, 75, 63, 0.25);
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        color: var(--ink);
        background:
          url("/static/silly-fella.jpeg") top 4% right 6% / 360px auto no-repeat,
          #0c0b0a;
        font-family: "Trebuchet MS", "Segoe UI", sans-serif;
        min-height: 100vh;
      }
      body::before {
        content: "";
        position: fixed;
        inset: 0;
        background-image:
          radial-gradient(circle at 85% 15%, rgba(255, 255, 255, 0.12), transparent 40%);
        pointer-events: none;
      }
      .page {
        max-width: 960px;
        margin: 0 auto;
        padding: 48px 24px 72px;
        position: relative;
        z-index: 1;
      }
      header {
        display: grid;
        gap: 12px;
        margin-bottom: 32px;
      }
      h1 {
        font-family: "Palatino Linotype", "Book Antiqua", Palatino, serif;
        font-size: clamp(2.2rem, 4vw, 3.4rem);
        margin: 0;
        letter-spacing: 0.02em;
      }
      .tagline {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.18em;
        font-size: 0.7rem;
        color: var(--accent-strong);
      }
      p.lead {
        margin: 0;
        color: var(--muted);
        font-size: 1.08rem;
        max-width: 520px;
        text-align: center;
        margin-left: auto;
        margin-right: auto;
      }
      .panel {
        background: var(--panel);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 26px;
        padding: 28px;
        box-shadow:
          0 30px 70px rgba(0, 0, 0, 0.45),
          0 0 0 1px rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(12px);
        animation: floatIn 0.6s ease-out;
      }
      form {
        display: grid;
        gap: 18px;
      }
      .row {
        display: grid;
        gap: 16px;
      }
      @media (min-width: 720px) {
        .row.cols-2 { grid-template-columns: 1fr 1fr; }
      }
      label {
        font-weight: 600;
        font-size: 0.95rem;
      }
      input[type="text"],
      input[type="file"] {
        width: 100%;
        padding: 12px 14px;
        border-radius: 14px;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(18, 16, 14, 0.78);
        color: var(--ink);
        font-size: 0.95rem;
      }
      input[type="file"] {
        padding: 10px;
        background: rgba(18, 16, 14, 0.7);
      }
      input:focus {
        outline: 2px solid var(--ring);
        border-color: var(--accent);
        box-shadow: 0 0 0 6px var(--glow);
      }
      button {
        padding: 14px 20px;
        border: none;
        border-radius: 999px;
        background: var(--accent);
        color: white;
        font-size: 1rem;
        font-weight: 700;
        cursor: pointer;
        box-shadow: 0 16px 36px rgba(31, 122, 111, 0.25);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      button:hover { transform: translateY(-2px); box-shadow: 0 18px 40px rgba(31, 122, 111, 0.3); }
      button:active { transform: translateY(0); }
      .hint {
        color: rgba(247, 242, 236, 0.7);
        font-size: 0.9rem;
      }
      .error {
        padding: 12px 16px;
        background: rgba(61, 15, 12, 0.8);
        color: #ffd6cc;
        border: 1px solid rgba(209, 75, 63, 0.6);
        border-radius: 12px;
        font-weight: 600;
      }
      .chip-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 10px;
      }
      .chip {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 6px 12px;
        border-radius: 999px;
        background: rgba(209, 75, 63, 0.2);
        color: #ffe5de;
        font-size: 0.8rem;
        font-weight: 600;
      }
      .section-title {
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        margin-top: 8px;
      }
      .control-grid {
        display: grid;
        gap: 12px;
      }
      @media (min-width: 720px) {
        .control-grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
      }
      @keyframes floatIn {
        from { opacity: 0; transform: translateY(12px); }
        to { opacity: 1; transform: translateY(0); }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <header>
        <div class="tagline">Studio Mode</div>
        <h1>Turn a PDF into a detailed podcast</h1>
        <p class="lead">plug any pdf of your choice and have fun :D !!</p>
      </header>
      <section class="panel">
        {% if error %}
          <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="/generate" enctype="multipart/form-data">
          <div class="row">
            <label for="pdf">PDF file</label>
            <input id="pdf" name="pdf" type="file" accept=".pdf" required>
          </div>
          <div class="row cols-2">
            <div>
              <label for="speaker1">Speaker 1</label>
              <input id="speaker1" name="speaker1" type="text" value="Elliott">
            </div>
            <div>
              <label for="speaker2">Speaker 2</label>
              <input id="speaker2" name="speaker2" type="text" value="Clementine">
            </div>
          </div>
          <div class="row cols-2">
            <div>
              <label for="voice1">Voice 1 (Edge TTS)</label>
              <input id="voice1" name="voice1" type="text" list="voice-options" value="en-US-GuyNeural">
            </div>
            <div>
              <label for="voice2">Voice 2 (Edge TTS)</label>
              <input id="voice2" name="voice2" type="text" list="voice-options" value="en-US-JennyNeural">
            </div>
          </div>
          <datalist id="voice-options">
            <option value="en-US-JennyNeural"></option>
            <option value="en-US-GuyNeural"></option>
            <option value="en-US-AriaNeural"></option>
            <option value="en-US-DavisNeural"></option>
            <option value="en-US-AmberNeural"></option>
            <option value="en-US-AnaNeural"></option>
            <option value="en-GB-SoniaNeural"></option>
            <option value="en-GB-RyanNeural"></option>
            <option value="en-AU-NatashaNeural"></option>
            <option value="en-AU-WilliamNeural"></option>
          </datalist>
          <div class="row">
            <label for="lang">Language</label>
            <input id="lang" name="lang" type="text" value="English">
          </div>
          <div class="row">
            <div class="section-title">Voice Tuning</div>
          </div>
          <div class="row control-grid cols-3">
            <div>
              <label for="rate">Speaking rate</label>
              <input id="rate" name="rate" type="text" list="rate-options" value="+0%">
            </div>
            <div>
              <label for="pitch">Pitch</label>
              <input id="pitch" name="pitch" type="text" list="pitch-options" value="+0Hz">
            </div>
            <div>
              <label for="model">Gemini model</label>
              <input id="model" name="model" type="text" list="model-options" value="gemini-2.5-flash">
            </div>
          </div>
          <datalist id="rate-options">
            <option value="-10%"></option>
            <option value="-5%"></option>
            <option value="+0%"></option>
            <option value="+5%"></option>
            <option value="+10%"></option>
          </datalist>
          <datalist id="pitch-options">
            <option value="-4Hz"></option>
            <option value="-2Hz"></option>
            <option value="+0Hz"></option>
            <option value="+2Hz"></option>
            <option value="+4Hz"></option>
          </datalist>
          <datalist id="model-options">
            <option value="gemini-2.5-flash"></option>
            <option value="gemini-2.5-pro"></option>
            <option value="gemini-2.0-flash"></option>
            <option value="gemini-2.0-pro"></option>
            <option value="gemini-1.5-pro"></option>
            <option value="gemini-1.5-flash"></option>
          </datalist>
          <div class="row">
            <div class="hint">Pick a model from the list or type any Gemini model ID.</div>
          </div>
          <div class="row">
            <button type="submit">Generate Podcast MP3</button>
            <div class="hint">Large PDFs can take a while. Keep this tab open while we build your audio.</div>
          </div>
        </form>
      </section>
    </div>
  </body>
</html>
